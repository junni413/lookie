# 1. [Docker] Database Configuration
# Host: localhost -> ${DB_HOST}
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=UTC&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 2. [Docker] JWT Configuration
jwt.secret=${JWT_SECRET}

# 3. [Docker] Redis Configuration
spring.data.redis.host=redis
spring.data.redis.port=6379

# 4. [Docker] Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true