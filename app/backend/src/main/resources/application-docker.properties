# 1. [Docker] Database Configuration
# Host: localhost -> ${DB_HOST}
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=UTC&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 2. [Docker] JWT Configuration
jwt.secret=${JWT_SECRET}

# 3. [Docker] Redis Configuration
spring.data.redis.host=redis
spring.data.redis.port=6379

# 4. [Docker] Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================================================
# 5. [Docker] Logging Configuration (✅ 필수 추가)
# ========================================================
# Docker Compose의 volumes: - ./data/logs/backend:/var/log/app 와 매핑됨
logging.file.name=/var/log/app/backend.log

# (선택) 로그 파일이 무한정 커지는 것을 방지 (Log Rotation)
# logging.logback.rollingpolicy.max-file-size=10MB
# logging.logback.rollingpolicy.max-history=30

# 6. [Docker] LiveKit Configuration
# ========================================================
livekit.url=${LIVEKIT_URL}
livekit.api-key=${LIVEKIT_API_KEY}
livekit.api-secret=${LIVEKIT_API_SECRET}

# 7. [Docker] File Upload Configuration
file.upload-dir=/data/images
file.base-url=${FILE_BASE_URL:https://i14b105.p.ssafy.io/images}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB