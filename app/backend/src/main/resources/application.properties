spring.application.name=backend

# 1. [Common] MyBatis Configuration
mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=lookie.backend.domain
mybatis.configuration.map-underscore-to-camel-case=true

# 2. [Local] Database Configuration (Default)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/lookie?serverTimezone=UTC&characterEncoding=UTF-8&useSSL=false
spring.datasource.username=lookie
spring.datasource.password=lookie123

# 3.[Local] JWT Configuration
jwt.secret=${JWT_SECRET:LocalDevSecretKeyMustBe32CharsLong}
jwt.expiration=${JWT_EXPIRATION:3600000}

# 4.[Local] Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false