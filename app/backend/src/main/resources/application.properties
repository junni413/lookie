spring.application.name=backend

# ==========================================
# 1. MyBatis Configuration
# ==========================================
mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.type-aliases-package=lookie.backend.domain
mybatis.configuration.map-underscore-to-camel-case=true

# ==========================================
# 2. Database Configuration (MySQL)
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/lookie?serverTimezone=UTC&characterEncoding=UTF-8&useSSL=false
spring.datasource.username=lookie
spring.datasource.password=lookie123

# ==========================================
# 3. JWT Configuration
# ==========================================
# Secret Key (Fallback provided for local dev)
jwt.secret=${JWT_SECRET:LocalDevSecretKeyMustBe32CharsLong}

# Access Token Expiration: 1 Hour (3600000 ms)
jwt.expiration=${JWT_EXPIRATION:3600000} 

# Refresh Token Expiration: 14 Days (1209600000 ms)
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:1209600000}

# ==========================================
# 4. CORS Configuration
# ==========================================
# Allowed Origins (Default: * for local dev, specific domain for prod)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ==========================================
# 5. Flyway Configuration
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.out-of-order=true
spring.flyway.repair-on-migrate=true

# ==========================================
# 6. Redis Configuration
# ==========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ==========================================
# 7. Mail Configuration (SMTP)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# 8. LiveKit Configuration
# ==========================================
livekit.url=${LIVEKIT_URL:wss://lookie-of5j44vq.livekit.cloud}
livekit.api-key=${LIVEKIT_API_KEY}
livekit.api-secret=${LIVEKIT_API_SECRET}