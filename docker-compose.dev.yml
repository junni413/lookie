services:

  # ============================
  # Redis 캐시 컨테이너
  # - 세션/토큰 블랙리스트/캐시/실시간 상태 저장 등 용도
  # ============================
  redis:
    image: redis:7-alpine                 # Redis 공식 이미지(가벼운 alpine)
    container_name: redis                 # 컨테이너 이름 고정
    ports:
      - "6379:6379"                       # (로컬/외부 접근 필요 시) 호스트:컨테이너 포트
    networks:
      - lookie                            # 같은 네트워크로 묶어서 서비스끼리 이름(mysql, redis)로 통신

  # ============================
  # MySQL DB 컨테이너
  # - 운영 데이터 저장소
  # ============================
  mysql:
    image: mysql:8.0                      # MySQL 8.0
    container_name: mysql                 # 컨테이너 이름 고정
    restart: always                       # 컨테이너가 죽으면 자동 재시작
    env_file:
      - .env                              # .env에서 환경변수 로드 (비번/DB명 등)
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}   # 생성할 DB 이름
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # root 비밀번호
      MYSQL_USER: ${MYSQL_USER}           # 애플리케이션용 계정 생성
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}   # 애플리케이션용 계정 비밀번호
    ports:
      - "3307:3306"                       # (외부 DB접속/워크벤치 필요 시) 호스트:컨테이너 포트
    volumes:
      - mysql_data:/var/lib/mysql         # DB 데이터 영구 저장(컨테이너 삭제해도 유지)
    networks:
      - lookie
    healthcheck:
      # MySQL이 실제로 응답 가능한지 체크 (depends_on: service_healthy에 사용)
      # - root 계정으로 ping 해서 DB가 뜰 때까지 기다림
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s                        # 체크 주기
      timeout: 3s                         # 1회 체크 타임아웃
      retries: 20                         # 실패 허용 횟수(총 대기 시간은 대략 interval*retries)
      start_period: 20s                   # 초기 기동 시간 여유(이 시간 동안 실패는 카운트 덜 함)

  # ============================
  # ✅ DB 마이그레이션 전용 컨테이너 (Flyway CLI)
  # - DB 스키마 변경을 앱(backend)과 분리해서 "배포 시 1회"만 수행
  # - backend 재시작이 DB 변경을 유발하지 않도록 안전장치
  # ============================
  migrate:
    image: flyway/flyway:10-alpine        # Flyway CLI 이미지
    container_name: migrate               # 컨테이너 이름 고정(필수는 아님)
    networks:
      - lookie
    depends_on:
      mysql:
        condition: service_healthy        # mysql healthcheck 통과 후 migrate 실행 가능
    env_file:
      - .env                              # DB 접속 정보(변수)를 동일하게 사용
    volumes:
      # ✅ Flyway가 읽는 SQL 폴더(/flyway/sql)에 로컬 migration 파일을 마운트
      # - ro: 읽기 전용(컨테이너가 SQL 파일을 수정하지 못하게)
      # - 너희 프로젝트에 migration 폴더가 다르면 경로만 바꾸면 됨
      - ./app/backend/src/main/resources/db/migration:/flyway/sql:ro
    command:
      - -url=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      - -user=${MYSQL_USER}
      - -password=${MYSQL_PASSWORD}
      - -connectRetries=60
      - migrate
    restart: "no"                            # migrate는 1회성 작업이므로 재시작하지 않음

  # ============================
  # Spring Boot Backend 컨테이너
  # - API 서버
  # ============================
  backend:
    build: ./app/backend                   # 로컬 Dockerfile로 이미지 빌드
    container_name: backend
    environment:
      - SPRING_PROFILES_ACTIVE=docker      # docker 프로파일 사용(application-docker.yml 등)
      # ✅ migrate 컨테이너가 DB 변경을 담당하므로, backend에서는 flyway 비활성화
      - SPRING_FLYWAY_ENABLED=false
      # (권장) JPA가 테이블을 자동 생성/변경하지 않고, 현재 스키마가 엔티티와 맞는지 검증만
      # - 운영에서는 validate / 개발에서는 update를 쓰는 식으로 분리 가능
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
    env_file:
      - .env                               # DB/JWT/Redis 등 런타임 환경변수 주입
    ports:
      - "8080:8080"                        # API 외부 노출 포트
    networks:
      - lookie
    depends_on:
      mysql:
        condition: service_healthy         # mysql 준비 후 backend 기동(최소한 DB 기동 타이밍 문제 방지)

  # ============================
  # Nginx Reverse Proxy 컨테이너
  # - 80 포트로 들어온 요청을 backend로 프록시하거나 정적 파일 서빙
  # ============================
  nginx:
    build:
      context: .                           # 빌드 컨텍스트(프로젝트 루트)
      dockerfile: infra/nginx/Dockerfile   # Nginx Dockerfile 위치
    ports:
      - "80:80"                            # 외부 공개 포트
    networks:
      - lookie
    depends_on:
      - backend                            # backend 먼저 띄우고 nginx 기동(단, health 기반은 아님)

# ============================
# 볼륨: DB 데이터 영구 저장
# ============================
volumes:
  mysql_data:

# ============================
# 네트워크: 컨테이너간 통신용 브리지 네트워크
# - 같은 네트워크에 있으면 "mysql:3306", "redis:6379"처럼 서비스명으로 접근 가능
# ============================
networks:
  lookie:
    driver: bridge