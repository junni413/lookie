services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks: [lookie]

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    env_file: [.env]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks: [lookie]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  migrate:
    image: flyway/flyway:10-alpine
    container_name: migrate
    networks: [lookie]
    depends_on:
      mysql:
        condition: service_healthy
    env_file: [.env]
    volumes:
      - ./app/backend/src/main/resources/db/migration:/flyway/sql:ro
    command:
      - -url=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      - -user=${MYSQL_USER}
      - -password=${MYSQL_PASSWORD}
      - -connectRetries=60
      - migrate
    restart: "no"

  backend:
    image: ${REGISTRY_IMAGE_BACKEND}:${IMAGE_TAG}
    container_name: backend
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_FLYWAY_ENABLED=false
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - AI_SERVER_URL=http://ai-server:8000
    env_file: [.env]
    ports:
      - "8080:8080"
    volumes:
      - ./data/logs/backend:/var/log/app
    networks: [lookie]
    depends_on:
      mysql:
        condition: service_healthy

  # ✅ 핵심 수정
  ai-server:
    image: ${REGISTRY_IMAGE_AI}:${IMAGE_TAG}
    container_name: ai-server
    profiles: ["ai"]        # ⭐⭐⭐ 핵심
    restart: always
    environment:
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      - BACKEND_URL=http://backend:8080
    volumes:
      - ./data/logs/ai:/app/logs
    networks: [lookie]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 5

  nginx:
    image: ${REGISTRY_IMAGE_NGINX}:${IMAGE_TAG}
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/logs/nginx:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks: [lookie]
    depends_on: [backend]

networks:
  lookie:
    driver: bridge
