services:
  # ============================
  # Redis: 캐시/세션/토큰 블랙리스트/실시간 상태 저장 등
  # ============================
  redis:
    image: redis:7-alpine                # ✅ 사용할 Redis 이미지(가벼운 alpine)
    container_name: redis                # ✅ 컨테이너 이름 고정(관리/디버깅 편함)
    ports:
      - "6379:6379"                      # (선택) 호스트에서 Redis 접속 필요할 때만 오픈
    networks:
      - lookie                           # ✅ 같은 네트워크로 묶어서 서비스명(redis)으로 접근 가능

  # ============================
  # MySQL: 운영 DB
  # ============================
  mysql:
    image: mysql:8.0                     # ✅ MySQL 8.0 이미지
    container_name: mysql                # ✅ 컨테이너 이름 고정
    restart: always                      # ✅ 죽으면 자동 재시작(운영에서 권장)
    env_file:
      - .env                             # ✅ DB 계정/비번/DB명 등을 .env에서 읽음
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}  # ✅ 초기 생성 DB명
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # ✅ root 비밀번호
      MYSQL_USER: ${MYSQL_USER}          # ✅ 앱용 계정 생성
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}  # ✅ 앱용 계정 비밀번호
    ports:
      - "3306:3306"                      # (선택) 외부/로컬에서 DB 접속이 필요할 때만 오픈
    volumes:
      - mysql_data:/var/lib/mysql        # ✅ DB 데이터 영구 저장(컨테이너 삭제해도 유지)
    networks:
      - lookie
    healthcheck:
      # ✅ mysql이 "정상 응답 가능한 상태"인지 체크
      # - migrate / backend가 mysql 준비될 때까지 기다리게 만들 때 사용
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s                       # 체크 주기
      timeout: 3s                        # 1회 체크 제한시간
      retries: 20                        # 최대 재시도 횟수
      start_period: 20s                  # 초기 기동 유예(처음엔 실패해도 카운트 덜 함)

  # ============================
  # Flyway migrate: 배포 시 DB 마이그레이션 "1회" 수행
  # ============================
  migrate:
    image: flyway/flyway:10-alpine       # ✅ Flyway CLI 공식 이미지
    container_name: migrate              # ✅ 컨테이너 이름 고정(로그/확인 편함)
    networks:
      - lookie
    depends_on:
      mysql:
        condition: service_healthy       # ✅ mysql healthcheck 통과 후에만 migrate 실행 가능
    env_file:
      - .env                             # ✅ DB 접속 정보 동일하게 사용
    volumes:
      # ✅ 로컬(서버)에 있는 migration SQL을 컨테이너 내부 /flyway/sql 로 마운트
      # ⚠️ 주의: EC2에 repo가 git clone 되어 있어야 이 경로가 존재함
      - ./app/backend/src/main/resources/db/migration:/flyway/sql:ro
    command: >
      # ✅ Flyway 실행 옵션(DB 접속 정보)
      -url=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      -user=${MYSQL_USER}
      -password=${MYSQL_PASSWORD}
      -connectRetries=60
      migrate                            # ✅ 실제 마이그레이션 수행
    restart: "no"                        # ✅ 1회성 작업이므로 자동 재시작 X

  # ============================
  # Backend: Spring Boot API 서버
  # ============================
  backend:
    image: ${REGISTRY_IMAGE_BACKEND}:${IMAGE_TAG}  # ✅ Docker Hub에서 pull할 이미지(배포는 pull 기반)
    container_name: backend
    environment:
      - SPRING_PROFILES_ACTIVE=docker     # ✅ application-docker.yml 등 docker 프로파일 사용
      - SPRING_FLYWAY_ENABLED=false       # ✅ Flyway는 migrate 컨테이너가 수행하므로 backend에선 끔
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate # ✅ 스키마 자동 변경 금지(현재 스키마 검증만)
    env_file:
      - .env                              # ✅ DB/Redis/JWT 등 런타임 환경변수 주입
    ports:
      - "8080:8080"                       # ✅ 외부에 API 공개 포트
    networks:
      - lookie
    depends_on:
      mysql:
        condition: service_healthy        # ✅ mysql 준비 후 backend 기동(타이밍 이슈 방지)

  # ============================
  # Nginx: Reverse Proxy + 정적 파일 서빙
  # ============================
  nginx:
    image: ${REGISTRY_IMAGE_NGINX}:${IMAGE_TAG}    # ✅ Docker Hub에서 pull할 이미지
    container_name: nginx
    ports:
      - "80:80"                           # ✅ 외부 공개 포트(브라우저 접속)
    networks:
      - lookie
    depends_on:
      - backend                           # ✅ backend 컨테이너가 먼저 뜬 뒤 nginx 기동(health 기반은 아님)

# ============================
# Volume: MySQL 데이터 영구 저장
# ============================
volumes:
  mysql_data:                              # ✅ 실제 데이터는 도커 볼륨에 유지됨

# ============================
# Network: 서비스 간 통신용 브리지 네트워크
# - 같은 네트워크면 "mysql:3306", "redis:6379" 처럼 서비스명으로 접근 가능
# ============================
networks:
  lookie:
    driver: bridge
