services:
  # ============================
  # Redis
  # - 캐시/세션/토큰 블랙리스트/실시간 상태 저장(선택) 등에 사용
  # ============================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    # AOF(Append Only File)로 영속화 → 재시작 후에도 데이터 유지
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      # Redis 데이터 영구 저장
      - ./data/redis:/data
    networks: [lookie]

  # ============================
  # MySQL (운영 DB)
  # - 서비스 운영 데이터 저장소
  # ============================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    env_file: [.env]
    environment:
      # 최초 생성 DB / 계정 정보 (없으면 컨테이너 초기화 시 반영)
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    ports:
      # 운영은 내부에서만 접근이면 포트 공개 안 해도 됨(필요하면 열기)
      - "3306:3306"
    volumes:
      # MySQL 데이터 영구 저장 (컨테이너 삭제/재배포해도 DB 유지)
      - ./data/mysql:/var/lib/mysql
    networks: [lookie]
    healthcheck:
      # "진짜로 접속 가능한 상태"가 될 때까지 체크
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  # ============================
  # Flyway migrate (DB 마이그레이션)
  # - 배포 시 DB 스키마 변경을 1회 실행
  # - backend 재시작이 DB 변경을 유발하지 않도록 분리
  # ============================
  migrate:
    image: flyway/flyway:10-alpine
    container_name: migrate
    networks: [lookie]
    environment:
      - FLYWAY_OUT_OF_ORDER=true
    depends_on:
      # MySQL이 healthy 상태가 된 후에만 migrate 실행
      mysql:
        condition: service_healthy
    env_file: [.env]
    volumes:
      # Flyway가 읽는 migration SQL 폴더를 컨테이너에 마운트(읽기 전용)
      - ./app/backend/src/main/resources/db/migration:/flyway/sql:ro
    command:
      # JDBC URL은 컨테이너 네트워크 내부 기준(mysql:3306)
      - -url=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      - -user=${MYSQL_USER}
      - -password=${MYSQL_PASSWORD}
      - -connectRetries=60
      - migrate
    # migrate는 1회 실행 컨테이너
    restart: "no"

  # ============================
  # Backend (Spring Boot)
  # - 운영에선 registry에서 받아온 이미지로 실행
  # ============================
  backend:
    image: ${REGISTRY_IMAGE_BACKEND}:${IMAGE_TAG}
    container_name: backend
    environment:
      # docker 프로파일 사용
      - SPRING_PROFILES_ACTIVE=docker
      # flyway는 별도 migrate 컨테이너에서 수행하므로 backend에서는 비활성화
      - SPRING_FLYWAY_ENABLED=false
      # 스키마 검증만 수행(운영에서 안전)
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      # AI 서버 호출 주소(같은 네트워크의 서비스명 사용)
      - AI_SERVER_URL=http://ai-server:8000
    env_file: [.env]
    ports:
      - "8080:8080"
    volumes:
      # 로그를 EC2 디스크에 남기기(운영 분석/장애 대응)
      - ./data/logs/backend:/var/log/app
    networks: [lookie]
    depends_on:
      # DB ready + migrate 성공 이후 backend 구동
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ============================
  # AI Server (FastAPI)
  # - profiles: ["ai"] → GPU 서버에서만 선택적으로 띄우기 위한 설정
  # - 운영에서 "GPU 서버"가 따로라면:
  #   docker compose --profile ai up -d ai-server
  # ============================
  ai-server:
    image: ${REGISTRY_IMAGE_AI}:${AI_IMAGE_TAG}
    container_name: ai-server
    profiles: ["ai"]
    restart: always
    env_file: [.env]
    environment:
      # CPU 스레드 제한 (서버 안정성)
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      # backend 내부 호출
      - BACKEND_URL=http://backend:8080
    volumes:
      # AI 서버 로그를 EC2에 남기기
      - ./data/logs/ai:/app/logs
      # ✅ 운영에서 모델 파일이 필요하면 마운트해서 사용
      # - ./data/models:/app/model:ro
    networks: [lookie]
    healthcheck:
      # AI 서버 헬스체크 엔드포인트가 있어야 함
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 5

  # ============================
  # Nginx (Reverse Proxy)
  # - 80/443 외부 요청을 backend로 라우팅
  # - certbot(letsEncrypt) 인증서 경로 마운트
  # ============================
  nginx:
    image: ${REGISTRY_IMAGE_NGINX}:${IMAGE_TAG}
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx 로그 저장
      - ./data/logs/nginx:/var/log/nginx
      # letsencrypt 인증서(EC2 호스트에 존재해야 함)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # 이미지 업로드 파일 등 정적 파일 저장 경로
      - ./data/images:/data/images
    networks: [lookie]
    depends_on: [backend]

  # ============================
  # Airflow MetaDB (Postgres)
  # - Airflow 자체 메타데이터(DB): DAG 실행 기록/Task 상태/스케줄러 상태 등 저장
  # - "서비스 운영 MySQL"과 분리하는 게 정석
  # ============================
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      TZ: Asia/Seoul
    volumes:
      # Airflow 메타DB 데이터 영구 저장
      - ./data/airflow/postgres:/var/lib/postgresql/data
    networks: [lookie]
    healthcheck:
      # postgres가 실제로 ready인지 체크
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ============================
  # Airflow Init
  # - airflow db migrate(메타DB 스키마 생성/업그레이드)
  # - 초기 admin 계정 생성(없으면 생성)
  # - 1회성 컨테이너(성공 후 종료)
  # ============================
  airflow-init:
    image: apache/airflow:2.9.3-python3.10
    container_name: airflow-init
    restart: "no"
    depends_on:
      # MetaDB 준비된 후 init 실행
      airflow-postgres:
        condition: service_healthy
      # lookie MySQL도 준비돼야 snapshot 적재 DAG에서 사용 가능
      mysql:
        condition: service_healthy
    env_file: [.env]
    environment:
      # LocalExecutor: webserver+스케줄러가 같은 머신에서 실행되는 운영 간단 구성
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      # Airflow 메타DB 연결(반드시 postgres)
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow

      # 예제 DAG 로드 방지
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # DAG를 생성하자마자 활성화(운영 정책에 따라 true/false 선택)
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      # 타임존
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Seoul
      # 설정 노출(운영에서는 false로 해도 됨)
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

      # 보안 키들(운영 필수급)
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      TZ: Asia/Seoul

      # ✅ lookie MySQL 연결 (Airflow Connection URI)
      # - conn_type은 mysql 이어야 Airflow Hook이 인식함
      AIRFLOW_CONN_LOOKIE_MYSQL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}

    volumes:
      # DAG 소스
      - ./datapipeline/airflow/dags:/opt/airflow/dags
      # 로그 저장(운영에서 디스크에 남김)
      - ./data/airflow/logs:/opt/airflow/logs
      # plugins(필요 시)
      - ./datapipeline/airflow/plugins:/opt/airflow/plugins
      # requirements를 컨테이너에 읽기 전용으로 마운트
      - ./datapipeline/airflow/requirements.txt:/requirements.txt:ro

    # init 단계에서 requirements 설치 + DB migrate + admin user 생성
    # 배열형 command를 쓰는 이유: YAML 줄바꿈/옵션 분리 문제 방지
    command: [
      "bash", "-lc",
      "set -euo pipefail; \
       pip install --no-cache-dir -r /requirements.txt; \
       airflow db migrate; \
       airflow users create \
         --username \"$AIRFLOW_ADMIN_USER\" \
         --password \"$AIRFLOW_ADMIN_PASSWORD\" \
         --firstname \"$AIRFLOW_ADMIN_FIRSTNAME\" \
         --lastname \"$AIRFLOW_ADMIN_LASTNAME\" \
         --role Admin \
         --email \"$AIRFLOW_ADMIN_EMAIL\" \
       || true"
    ]
    networks: [lookie]

  # ============================
  # Airflow Webserver (UI)
  # - UI 포트 8081로 오픈 (운영에서는 SG로 IP 제한 권장)
  # - init 성공 이후에만 실행
  # ============================
  airflow-webserver:
    image: apache/airflow:2.9.3-python3.10
    container_name: airflow-webserver
    restart: always
    depends_on:
      # init이 끝나야 UI 실행
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    env_file: [.env]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Seoul
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
      TZ: Asia/Seoul
      AIRFLOW_CONN_LOOKIE_MYSQL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    ports:
      # Airflow UI 접근: http://EC2:8081
      - "8081:8080"
    volumes:
      - ./datapipeline/airflow/dags:/opt/airflow/dags
      - ./data/airflow/logs:/opt/airflow/logs
      - ./datapipeline/airflow/plugins:/opt/airflow/plugins
      - ./datapipeline/airflow/requirements.txt:/requirements.txt:ro
    # 운영 안정성을 위해 command도 배열형으로 통일
    command: ["bash","-lc","pip install --no-cache-dir -r /requirements.txt && airflow webserver"]
    networks: [lookie]

  # ============================
  # Airflow Scheduler
  # - DAG 스케줄링/실행 담당
  # - init 이후에 실행
  # ============================
  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.10
    container_name: airflow-scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    env_file: [.env]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Seoul
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      TZ: Asia/Seoul
      AIRFLOW_CONN_LOOKIE_MYSQL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    volumes:
      - ./datapipeline/airflow/dags:/opt/airflow/dags
      - ./data/airflow/logs:/opt/airflow/logs
      - ./datapipeline/airflow/plugins:/opt/airflow/plugins
      - ./datapipeline/airflow/requirements.txt:/requirements.txt:ro
    command: ["bash","-lc","pip install --no-cache-dir -r /requirements.txt && airflow scheduler"]
    networks: [lookie]

networks:
  lookie:
    driver: bridge
