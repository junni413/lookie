services:
  # ============================
  # MySQL Database 컨테이너
  # ============================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - lookie
    healthcheck:
      # MySQL이 실제로 응답 가능한지 체크
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  # ============================
  # Spring Boot Backend 컨테이너
  # ============================
  backend:
    build: ./app/backend
    container_name: backend
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - lookie
    depends_on:
      mysql:
        condition: service_healthy

  # ============================
  # Nginx Reverse Proxy 컨테이너
  # ============================
  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    ports:
      - "80:80"
    networks:
      - lookie
    depends_on:
      - backend

volumes:
  mysql_data:

networks:
  lookie:
    driver: bridge
