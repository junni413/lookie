
services:

  # ============================
  # MySQL Database 컨테이너
  # ============================
  # mysql:
  #   image: mysql:8.0                 # MySQL 공식 이미지 사용
  #   container_name: mysql            # 컨테이너 이름 지정
  #   restart: always                  # 컨테이너 종료 시 자동 재시작
  #   env_file:
  #     - .env                         # DB 계정 정보, 비밀번호 등 환경변수 로딩
  #   ports:
  #     - "3306:3306"                  # 로컬 PC → 컨테이너 DB 포트 연결
  #   volumes:
  #     - mysql_data:/var/lib/mysql    # DB 데이터 영구 저장 (컨테이너 삭제해도 유지)
  #   networks:
  #     - lookie

  # ============================
  # Spring Boot Backend 컨테이너
  # ============================
  backend:
    build: ./app/backend             # backend Dockerfile 위치
    container_name: backend
    depends_on:
      - mysql                        # mysql 컨테이너 먼저 실행
    env_file:
      - .env                         # DB 접속 정보, Spring 환경 변수 로딩
    ports:
      - "8080:8080"                  # 로컬 → Spring API 포트 연결
    networks:
      - lookie

  # ============================
  # React Frontend 빌드 컨테이너
  # ============================
  frontend:
    build: ./app/frontend
    container_name: frontend
    volumes:
      - ./app/frontend:/app     # ⭐ dist를 호스트에 생성시키기
    networks:
      - lookie

  # ============================
  # Nginx Reverse Proxy 컨테이너
  # ============================

  nginx:
    build: ./infra/nginx              # nginx Dockerfile 위치
    container_name: nginx
    volumes:
      - ./app/frontend/dist:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lookie

# ============================
# 볼륨 정의 (데이터 영속화)
# ============================
volumes:
  mysql_data:        # MySQL 데이터 저장용 볼륨

# ============================
# 네트워크 정의 (서비스 간 통신용) 
# ============================
networks:
  lookie:
    driver: bridge