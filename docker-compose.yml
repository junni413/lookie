
services:

  # ============================
  # MySQL Database 컨테이너
  # ============================
  mysql:
    image: mysql:8.0                 # MySQL 공식 이미지 사용
    container_name: mysql            # 컨테이너 이름 지정
    restart: always                  # 컨테이너 종료 시 자동 재시작
    env_file:
      - .env                         # DB 계정 정보, 비밀번호 등 환경변수 로딩
    ports:
      - "3306:3306"                  # 로컬 PC → 컨테이너 DB 포트 연결
    volumes:
      - mysql_data:/var/lib/mysql    # DB 데이터 영구 저장 (컨테이너 삭제해도 유지)

  # ============================
  # Spring Boot Backend 컨테이너
  # ============================
  backend:
    build: ./app/backend             # backend Dockerfile 위치
    container_name: backend
    depends_on:
      - mysql                        # mysql 컨테이너 먼저 실행
    env_file:
      - .env                         # DB 접속 정보, Spring 환경 변수 로딩
    ports:
      - "8080:8080"                  # 로컬 → Spring API 포트 연결

  # ============================
  # React Frontend 빌드 컨테이너
  # ============================
  frontend:
    build: ./app/frontend            # frontend Dockerfile 위치
    container_name: frontend

    # React 빌드 결과(dist)를 볼륨으로 공유
    # → nginx 컨테이너가 동일한 빌드 파일을 접근 가능
    volumes:
      - frontend_dist:/app/dist

  # ============================
  # Nginx Reverse Proxy 컨테이너
  # ============================
  nginx:
    build: ./infra/nginx             # nginx Dockerfile 위치
    container_name: nginx
    depends_on:
      - frontend                     # frontend 먼저 실행
      - backend                      # backend 먼저 실행
    ports:
      - "80:80"                      # 외부 접속 포트 (브라우저 접근 포트)

    # frontend에서 생성한 dist 파일을 nginx가 서빙
    volumes:
      - frontend_dist:/usr/share/nginx/html

# ============================
# 볼륨 정의 (데이터 영속화)
# ============================
volumes:
  mysql_data:        # MySQL 데이터 저장용 볼륨
  frontend_dist:     # React 빌드 결과 공유용 볼륨
