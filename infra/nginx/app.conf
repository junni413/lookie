# =====================================
# Upstream 서비스 정의
# =====================================

# React 빌드 결과를 서빙하는 컨테이너
upstream frontend {
    server frontend:80;
}

# Spring API 컨테이너
upstream backend {
    server backend:8080;
}

# =====================================
# HTTP Server
# =====================================

server {
    listen 80;

    # -------------------------------
    # React SPA 라우팅
    # -------------------------------
    location / {
        proxy_pass http://frontend;

        # SPA 새로고침 시 index.html fallback
        try_files $uri $uri/ /index.html;

        # 클라이언트 정보 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------------
    # Spring API 라우팅
    # -------------------------------
    location /api/ {
        proxy_pass http://backend;

        # 클라이언트 정보 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
