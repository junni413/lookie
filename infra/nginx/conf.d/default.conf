# =====================================
# Upstream 서비스 정의
# =====================================

# Spring API 컨테이너 (docker-compose 서비스명: backend)
upstream backend {
    server backend:8080;
}

# =====================================
# WebSocket Upgrade 헤더를 안전하게 처리하기 위한 map
# - Upgrade 헤더가 있을 때만 Connection: upgrade
# - 없으면 close
# =====================================
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# =====================================
# HTTP (80) Server
#  - 모든 HTTP 요청을 HTTPS로 리다이렉트
# =====================================

server {
    listen 80;
    listen [::]:80;

    server_name i14b105.p.ssafy.io;

    return 301 https://$host$request_uri;
}

# =====================================
# HTTPS (443) Server
#  - React 정적 파일 제공 + SPA 라우팅
#  - /api/ 요청은 Spring(backend)로 reverse proxy
# =====================================

server {
    listen 443 ssl;
    server_name i14b105.p.ssafy.io;

    # -------------------------------
    # SSL 인증서 설정
    # -------------------------------
    ssl_certificate     /etc/letsencrypt/live/i14b105.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i14b105.p.ssafy.io/privkey.pem;

    # -------------------------------
    # React 정적 파일 위치
    # -------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------
    # React SPA 라우팅
    # -------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------
    # Spring API 라우팅
    # - REST + WebSocket 모두 /api/로 들어오므로
    #   Upgrade/Connection은 map을 통해 안전하게 처리
    # -------------------------------
    location /api/ {
        proxy_pass http://backend;

        # 원본 요청 정보 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 프록시 체인 정보
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # (선택/권장) Authorization 헤더 전달 명시
        proxy_set_header Authorization $http_authorization;

        # WebSocket 업그레이드 대응
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # WebSocket 연결 유지에 필요한 타임아웃(권장)
        # proxy_read_timeout 3600s;
        # proxy_send_timeout 3600s;
    }

    # -------------------------------
    # 정적 이미지 서빙
    # -------------------------------
    location /images/ {
        alias /data/images/;
        autoindex off;

        expires 7d;
        add_header Cache-Control "public";

        access_log off;
    }
}
