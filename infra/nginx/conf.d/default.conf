# =====================================
# Upstream 서비스 정의
# =====================================

# Spring API 컨테이너 (docker-compose 서비스명: backend)
upstream backend {
    server backend:8080;
}

# =====================================
# HTTP (80) Server
#  - 인증서 발급/운영 안정성을 위해
#  - 모든 HTTP 요청을 HTTPS로 리다이렉트
# =====================================

server {
    listen 80;
    listen [::]:80;

    # ✅ 실제 접속 도메인에 맞춰 지정 (예: i14b105.p.ssafy.io)
    server_name i14b105.p.ssafy.io;

    # ✅ HTTP → HTTPS 강제 이동
    return 301 https://$host$request_uri;
}

# =====================================
# HTTPS (443) Server
#  - React 정적 파일 제공 + SPA 라우팅
#  - /api/ 요청은 Spring(backend)로 reverse proxy
# =====================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # ✅ 실제 접속 도메인
    server_name i14b105.p.ssafy.io;

    # -------------------------------
    # ✅ SSL 인증서 설정
    # - 너가 가지고 있는 와일드카드 인증서(*.p.ssafy.io)를 그대로 사용
    # - 컨테이너에 /etc/letsencrypt 를 read-only로 마운트해야 함
    # -------------------------------
    ssl_certificate     /etc/letsencrypt/live/p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p.ssafy.io/privkey.pem;

    # (선택) SSL 권장 옵션: 세션 캐시 등 기본 최적화
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;

    # -------------------------------
    # React 정적 파일 위치
    # -------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------
    # React SPA 라우팅
    # - 파일이 없으면 index.html로 넘겨서 클라이언트 라우팅 유지
    # -------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------
    # Spring API 라우팅
    # - /api/ 로 들어오는 요청을 backend(8080)로 전달
    # -------------------------------
    location /api/ {
        # ✅ upstream 이름으로 프록시
        proxy_pass http://backend;

        # ✅ 원본 요청 정보 전달 (백엔드에서 로그/보안/리다이렉트 등에 필요)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # ✅ 프록시 체인 정보 (권장)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # (선택) WebSocket/업그레이드 필요할 때만 사용
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }
}
