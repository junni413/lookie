# =====================================
# Upstream 서비스 정의
# =====================================


# Spring API 컨테이너
upstream backend {
    server backend:8080;
}

# =====================================
# HTTP Server
# =====================================

server {
    listen 80;

    # React 정적 파일 위치
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------
    # React SPA 라우팅
    # -------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------
    # Spring API 라우팅
    # -------------------------------
    location /api/ {
        proxy_pass http://backend;

        # 클라이언트 정보 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # ==========================
    # ✅ 이미지 정적 서빙 (추가)
    # ==========================
    location /images/ {
        alias /data/images/;
        autoindex off;

        # 캐시 짧게 (dev)
        expires 1h;
        add_header Cache-Control "public";
    }
}
